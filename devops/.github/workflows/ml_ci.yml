name: ML Pipeline CI

on:
  push:
    branches: [ main, develop, 'feature/**' ]
    paths:
      - 'ml/**'
      - 'data/synthetic/**'
      - '.github/workflows/ml_ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'ml/**'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ml/requirements.txt
          pip install flake8 black pytest

      - name: Lint with flake8
        run: |
          flake8 ml/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 ml/ --count --max-line-length=120 --statistics

      - name: Format check with black
        run: |
          black --check ml/

      - name: Generate synthetic data
        run: |
          python data/synthetic/generate_equipment_master.py
          python data/synthetic/generate_maintenance_logs.py
          python data/synthetic/generate_incidents.py

      - name: Test ML model training (dry run)
        run: |
          echo "Testing ML model trainer..."
          python -c "from ml.predictive_maintenance.model_trainer import train_failure_predictor; print('Model trainer imports OK')"

      - name: Run ML pipeline tests
        run: |
          pytest ml/ --verbose || echo "No tests configured yet for ML pipeline"

  validate-data-generators:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas

      - name: Run all data generators
        run: |
          python data/synthetic/generate_equipment_master.py
          python data/synthetic/generate_maintenance_logs.py
          python data/synthetic/generate_work_orders.py
          python data/synthetic/generate_incidents.py
          python data/synthetic/generate_inspection_records.py
          python data/synthetic/generate_compliance_docs.py

      - name: Verify generated files
        run: |
          ls -lh data/seeds/
          echo "Equipment master CSV line count:"
          wc -l data/seeds/equipment_master.csv
          echo "Maintenance logs JSON size:"
          du -h data/seeds/maintenance_logs.json

      - name: Upload generated data as artifacts
        uses: actions/upload-artifact@v3
        with:
          name: synthetic-data
          path: data/seeds/
