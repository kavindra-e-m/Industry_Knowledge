version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ps08
      POSTGRES_PASSWORD: ps08pass
      POSTGRES_DB: ps08
    ports:
      - "5432:5432"
    volumes:
      - ./data-infra/db/postgres/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/ps08password
    ports:
      - "7474:7474"
      - "7687:7687"

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"

  backend:
    build: ./backend
    environment:
      NEO4J_URI: bolt://neo4j:7687
      CHROMA_HOST: chromadb
      POSTGRES_URL: postgresql://ps08:ps08pass@postgres:5432/ps08
    ports:
      - "8080:8000"
    depends_on:
      - postgres
      - neo4j
      - chromadb
